<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小熊的每日任務</title>
<style>
  body {
    font-family: "Comic Sans MS", sans-serif;
    background: linear-gradient(135deg, #FFF1EB, #ACE0F9);
    text-align: center;
    padding: 20px;
  }
  h1 {
    color: #ff8c00;
  }
  .task {
    background: #fff;
    margin: 10px auto;
    padding: 15px;
    width: 250px;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    text-align: left;
  }
  input[type="checkbox"] {
    transform: scale(1.3);
    margin-right: 8px;
  }
  .points {
    margin-top: 20px;
    font-size: 1.3em;
    color: #ff6347;
  }
  button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #ffb347;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1em;
  }
  button:hover {
    background: #ffcc33;
  }
</style>
</head>
<body>

<h1>🐻 小熊的每日任務</h1>

<div class="task"><input type="checkbox" class="taskCheck">刷牙</div>
<div class="task"><input type="checkbox" class="taskCheck">整理書包</div>
<div class="task"><input type="checkbox" class="taskCheck">幫忙收玩具</div>
<div class="task"><input type="checkbox" class="taskCheck">閱讀 10 分鐘</div>

<div class="points">⭐ 今日星星：<span id="todayPoints">0</span></div>
<div class="points">🌈 本週累積：<span id="weeklyPoints">0</span>/7</div>

<button onclick="resetDay()">🔄 重置今天</button>
<br>
<button onclick="goHome()">🏠 回首頁</button>

<script>
  const today = new Date().toDateString();
  const todayKey = 'kid2_today_' + today;
  const weekKey = 'kid2_weeklyPoints';

  const taskChecks = document.querySelectorAll('.taskCheck');
  const todayPoints = document.getElementById('todayPoints');
  const weeklyPoints = document.getElementById('weeklyPoints');

  let weekly = parseInt(localStorage.getItem(weekKey)) || 0;

  if (localStorage.getItem(todayKey)) {
    taskChecks.forEach(chk => chk.disabled = true);
    todayPoints.textContent = 1;
  }

  taskChecks.forEach(chk => {
    chk.addEventListener('change', () => {
      if ([...taskChecks].every(c => c.checked)) {
        localStorage.setItem(todayKey, true);
        weekly++;
        localStorage.setItem(weekKey, weekly);
        todayPoints.textContent = 1;
        weeklyPoints.textContent = weekly;
        alert("🎉 小熊太棒了！獲得 1 顆星星 ⭐");
        taskChecks.forEach(c => c.disabled = true);
      }
    });
  });

  weeklyPoints.textContent = weekly;

  function resetDay() {
    localStorage.removeItem(todayKey);
    taskChecks.forEach(c => {
      c.checked = false;
      c.disabled = false;
    });
    todayPoints.textContent = 0;
  }

  function goHome() {
    window.location.href = "index.html";
  }

  const todayDate = new Date();
  if (todayDate.getDay() === 1 && !localStorage.getItem('kid2_weekReset_' + todayDate.getFullYear() + todayDate.getMonth() + todayDate.getDate())) {
    localStorage.setItem(weekKey, 0);
    weekly = 0;
    localStorage.setItem('kid2_weekReset_' + todayDate.getFullYear() + todayDate.getMonth() + todayDate.getDate(), true);
  }
</script>

</body>
</html>
